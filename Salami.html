<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EID SALAMI</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Hind Siliguri',sans-serif;}

body{
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
color:white;
perspective: 1000px; 
}

.phone{
width:360px;
height:720px;
border-radius:40px;
padding:10px;
background:#000;
box-shadow:0 0 80px rgba(255,215,0,0.5);
animation: floatPhone 6s ease-in-out infinite;
position: relative;
}

@keyframes floatPhone {
0%, 100% { transform: translateY(0px) rotateX(0deg); box-shadow:0 0 80px rgba(255,215,0,0.5); }
50% { transform: translateY(-15px) rotateX(2deg); box-shadow:0 20px 100px rgba(255,215,0,0.7); }
}

.screen{
width:100%;
height:100%;
border-radius:30px;
position:relative;
overflow:hidden;
background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)),
url('https://images.unsplash.com/photo-1609599006353-e629aaabfeae?q=80&w=1200&auto=format&fit=crop');
background-size:cover;
background-position:center;
}

.eid-bg-icon {
position: absolute;
font-size: 14px;
opacity: 0.3;
z-index: 1;
pointer-events: auto; 
cursor: pointer; 
filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.8));
animation: floatBgElements linear infinite, spinIcon ease-in-out infinite alternate;
transition: transform 0.2s, opacity 0.2s;
}

@keyframes floatBgElements {
0% { transform: translateY(100vh) scale(0.8); opacity: 0; }
20% { opacity: 0.5; }
80% { opacity: 0.5; }
100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
}

@keyframes spinIcon {
0% { margin-left: -20px; transform: rotate(-15deg); }
100% { margin-left: 20px; transform: rotate(15deg); }
}

.center{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%) scale(1) rotateY(0deg);
text-align:center;
width:90%;
z-index:2;
transition:all 0.9s cubic-bezier(0.68, -0.55, 0.265, 1.55);
transform-style: preserve-3d;
}

.hidden{
opacity:0;
transform:translate(-50%,-60%) scale(0.6) rotateX(-20deg) rotateY(15deg);
pointer-events:none;
filter: blur(8px);
}

.glow{
font-size:20px;
font-weight:700;
background:linear-gradient(270deg,#FFD700,#fff,#FFD700,#ffae00);
background-size:400%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glowMove 6s linear infinite;
text-shadow:0 0 25px rgba(255,215,0,0.6);
line-height: 1.5;
}

@keyframes glowMove{
0%{background-position:0%}
100%{background-position:100%}
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#FFD700,#caa400);
color:black;
font-weight:bold;
margin-top:25px;
cursor:pointer;
transition:.4s;
animation: pulseBtn 2s infinite;
font-size: 15px;
}

button:hover{
transform:scale(1.1) translateY(-3px);
box-shadow:0 10px 25px rgba(255, 215, 0, 0.9);
}

@keyframes pulseBtn {
0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
70% { box-shadow: 0 0 0 15px rgba(255, 215, 0, 0); }
100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
}

input{
padding:12px;
border-radius:20px;
border:2px solid rgba(255,215,0,0.3);
background: rgba(0, 0, 0, 0.5);
color: #FFD700;
width:80%;
margin-top:15px;
text-align:center;
transition: 0.4s;
font-size: 16px;
font-weight: 600;
}

input:focus {
outline: none;
border-color: #FFD700;
box-shadow: 0 0 25px rgba(255, 215, 0, 0.8), inset 0 0 10px rgba(255, 215, 0, 0.3);
transform: scale(1.08);
background: rgba(0, 0, 0, 0.9);
}

.shake{animation:shake 0.5s;}
@keyframes shake{
0%, 100%{transform:translate(-50%,-50%)}
20%, 60%{transform:translate(-55%,-50%)}
40%, 80%{transform:translate(-45%,-50%)}
}

.kolakuli-text {
font-size: 18px;
color: #FFD700;
margin-top: 15px;
margin-bottom: 20px;
}

.hug-btn {
font-size: 70px;
cursor: pointer;
user-select: none;
animation: pulseBtn 1.5s infinite;
display: inline-block;
transition: transform 0.2s ease-in-out;
filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.6));
}

.visualizer {
position: absolute;
bottom: 35px;
left: 50%;
transform: translateX(-50%);
display: flex;
gap: 6px;
align-items: center;
height: 50px;
z-index: 10;
opacity: 0;
transition: 1.5s ease-in-out;
}
.visualizer.active { opacity: 1; }

.wave-bar {
width: 5px;
height: 12px;
border-radius: 20px;
background: linear-gradient(180deg, #fff 0%, #FFD700 50%, #caa400 100%);
animation: dynamicWave 1s infinite ease-in-out;
}

@keyframes dynamicWave {
0%, 100% { transform: scaleY(0.4); opacity: 0.6; }
50% { transform: scaleY(3.2); opacity: 1; }
}

#finalFull{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:radial-gradient(circle at center,#1a1400 0%,#000000 100%);
z-index:9999;
opacity: 0;
transition: opacity 2.5s ease-in-out;
}
#finalFull.show { opacity: 1; }

.moon {
width: 90px;
height: 90px;
border-radius: 50%;
box-shadow: 18px 18px 0 0 #FFD700;
position: absolute;
top: 8%;
opacity: 0;
filter: drop-shadow(0 0 20px rgba(255,215,0,0.8));
animation: moonRise 3.5s cubic-bezier(0.2, 1, 0.2, 1) forwards 1s;
}

@keyframes moonRise {
0% { opacity: 0; transform: translateY(60px) scale(0.5); }
100% { opacity: 1; transform: translateY(0) scale(1); }
}

.particle{
position:absolute;
background:#FFD700;
border-radius:50%;
opacity:0;
animation:floatUp linear infinite;
}

@keyframes floatUp{
0% {transform:translateY(110vh); opacity:0;}
50% {opacity:0.9;}
100% {transform:translateY(-10vh); opacity:0;}
}

.finalText{
font-size:26px;
font-weight:700;
text-align:center;
z-index:2;
margin-top: 60px;
padding: 0 15px;
background:linear-gradient(to right, #bf953f, #fff, #b38728, #fbf5b7, #aa771c);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation: cinematicReveal 4s forwards;
}

@keyframes cinematicReveal{
0% { opacity: 0; transform: scale(1.5); filter: blur(20px); }
100% { opacity: 1; transform: scale(1); filter: blur(0); }
}

/* 🎁 SALAMI PAYMENT BOX MODIFIED */
.salami-payment-box {
margin-top: 25px;
padding: 20px;
border: 2px solid #FFD700;
border-radius: 20px;
background: rgba(0, 0, 0, 0.8);
width: 90%;
max-width: 350px;
z-index: 10;
text-align: center;
box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
animation: popSalami 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 2.5s;
opacity: 0;
transform: scale(0.8);
}

@keyframes popSalami {
to { opacity: 1; transform: scale(1); }
}

.payment-title {
color: #FFD700;
font-size: 18px;
font-weight: bold;
margin-bottom: 15px;
border-bottom: 1px solid rgba(255, 215, 0, 0.3);
padding-bottom: 10px;
}

.method {
margin-bottom: 12px;
display: flex;
flex-direction: column;
align-items: center;
}

.method span {
font-size: 14px;
color: #fff;
opacity: 0.8;
}

.method strong {
font-size: 19px;
color: #fff;
letter-spacing: 1px;
margin-top: 4px;
display: block;
text-shadow: 0 0 5px #FFD700;
}

.wa-wrapper {
margin-top: 30px;
z-index: 10;
opacity: 0;
animation: waSlideUp 1.2s forwards 3.5s;
}

.wa-btn {
background: linear-gradient(45deg, #25D366, #128C7E);
color: white;
text-decoration: none;
padding: 12px 25px;
border-radius: 40px;
font-weight: bold;
display: inline-flex;
align-items: center;
gap: 10px;
}

@keyframes waSlideUp { to { opacity: 1; transform: translateY(0); } }

.watermark{
position:absolute;
bottom:12px;
right:15px;
font-size:11px;
opacity:.5;
}
</style>
</head>

<body>

<audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
<audio id="magicSound" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
<audio id="popSound" src="https://assets.mixkit.co/active_storage/sfx/2688/2688-preview.mp3"></audio>
<audio id="bgMusic" loop>
<source src="https://raw.githubusercontent.com/nafis1630/Eid-Gift-By-Nafis-Fuad-/main/Islamicsound.mp3" type="audio/mp3">
</audio>

<div class="phone">
<div class="screen" id="mainScreen">

<div id="step0" class="center">
<h3 class="glow">তোমার নাম লিখো ✨</h3>
<input id="name" placeholder="তোমার নাম..." autocomplete="off">
<button onclick="start()">✨ শুরু করো</button>
</div>

<div id="step1" class="center hidden">
<h3 id="msg1" class="glow"></h3>
<button onclick="next(2)" id="btn1" style="display:none;">👉 এগিয়ে যাও</button>
</div>

<div id="step2" class="center hidden">
<h3 id="msg2" class="glow"></h3>
<button onclick="next(3)" id="btn2" style="display:none;">🫂 কোলাকুলি করুন</button>
</div>

<div id="step3" class="center hidden">
<h3 class="glow">আগে কোলাকুলি হয়ে যাক! ✨</h3>
<p class="kolakuli-text">ইমোজিতে <span id="tapCount" style="font-weight:bold; font-size:24px;">৩</span> বার ট্যাপ করো</p>
<div id="hugArea" class="hug-btn" onclick="handleKolaKuli()">🫂</div>
</div>

<div class="visualizer" id="eqBars">
  <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
</div>

<div class="watermark">Created by Hak4X Lab</div>
</div>
</div>

<div id="finalFull">
<div class="moon"></div>
<h1 class="finalText" id="finalGreeting">তোমাকে পবিত্র ঈদুল ফিতরের শুভেচ্ছা 🕌</h1>

<div class="salami-payment-box">
  <div class="payment-title">চাঁদ দেখা যায় আকাশে <br> Hak4X Lab এর এডমিনদের সালামি দিন বিকাশ, নগদ, রকেটে</div>
  
  <div class="method">
    <span>bKash (Personal)</span>
    <strong>01794385638</strong>
  </div>
  
  <div class="method">
    <span>Nagad / Rocket</span>
    <strong>01712494933</strong>
  </div>
</div>

<div class="wa-wrapper">
  <a id="waShare" href="#" class="wa-btn" target="_blank">Share on WhatsApp</a>
</div>
</div>

<script>
function playSound(id) {
    let audio = document.getElementById(id);
    audio.currentTime = 0;
    audio.play().catch(()=>{});
}

function startMusic(){
    let music = document.getElementById("bgMusic");
    let eqBars = document.getElementById("eqBars");
    music.volume = 0.5;
    music.play().then(()=> eqBars.classList.add("active")).catch(()=>{});
}

function start(){
    let name=document.getElementById("name").value.trim();
    if(!name){
        document.getElementById("step0").classList.add("shake");
        setTimeout(()=>document.getElementById("step0").classList.remove("shake"),500);
        return;
    }
    playSound('clickSound'); 
    startMusic();
    step0.classList.add("hidden");
    step1.classList.remove("hidden");
    
    let shayari = `আকাশে উঠেছে ঈদের চাঁদ, ${name}-এর জীবনে না থাকুক কোনো অবসাদ! ✨`;
    typeText(msg1, shayari, 'btn1');
}

function typeText(el, text, btnId){
    el.innerHTML="";
    let i=0;
    function typing(){
        if(i<text.length){ el.innerHTML += text.charAt(i); i++; setTimeout(typing,35); }
        else { document.getElementById(btnId).style.display = "inline-block"; }
    }
    typing();
}

function next(step){
    playSound('clickSound'); 
    document.querySelectorAll(".center").forEach(e=>e.classList.add("hidden"));
    document.getElementById("step"+step).classList.remove("hidden");
    if(step===2){
        typeText(msg2, `এই পবিত্র দিনে আল্লাহ তোমার সব দোয়া কবুল করুন। ঈদ মোবারক।🌙💫`, 'btn2');
    }
}

let tapsLeft = 3;
function handleKolaKuli() {
    if(tapsLeft <= 0) return;
    tapsLeft--;
    playSound('popSound');
    document.getElementById('tapCount').innerText = tapsLeft;
    if(tapsLeft === 0) {
        setTimeout(() => nextFinal(), 600);
    }
}

function nextFinal(){
    playSound('magicSound'); 
    document.querySelector('.phone').style.display = "none";
    let name = document.getElementById("name").value.trim();
    let finalScreen = document.getElementById("finalFull");
    finalScreen.style.display = "flex";
    setTimeout(() => finalScreen.classList.add("show"), 50);

    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#FFD700', '#ffffff'] });

    let message = `${name} আমি Hak4X Lab এর এডমিনদের ঈদ সালামি দিয়েছি আপনিও দিন!! 🌙✨\nসালামি দিতে লিংকে ক্লিক করুন: ${window.location.href}`;
    document.getElementById("waShare").href = `whatsapp://send?text=${encodeURIComponent(message)}`;
}
</script>

</body>
</html>
